name: Deploy Frontend (Vercel)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || 'placeholder_org' }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || 'placeholder_project' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder_key' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Generate environment.ts
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            supabaseUrl: '${SUPABASE_URL}',
            supabaseKey: '${SUPABASE_KEY}'
          };
          EOF

      - name: Build Angular App
        run: npm run build

      - name: Deploy to Vercel
        run: |
          if [ -n "${VERCEL_TOKEN}" ]; then
            vercel --prod --token $VERCEL_TOKEN --confirm
          else
            echo "Skipping deploy (no VERCEL_TOKEN)"
          fi
