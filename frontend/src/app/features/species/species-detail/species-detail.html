@if (loading()) {
  <div class="loading">Loading species...</div>
}

@if (error()) {
  <div class="error">{{ error() }}</div>
}

@if (species) {
  <div class="species-detail">

    <div class="header">
      <h1>{{ species.common_name }}</h1>

      <span class="badge" [class]="species.type">
        {{ species.type }}
      </span>
    </div>

    <div class="card">
      <div class="info">
        <h3>Scientific name</h3>
        <p>{{ species.genus }} {{ species.species }}</p>
      </div>

      <div class="info">
        <h3>Type</h3>
        <p>{{ species.type }}</p>
      </div>
    </div>

    <div class="actions">
      <a class="btn edit"
         [routerLink]="['/species', species.id, 'edit']">
        Edit
      </a>

      <button class="btn delete"
              (click)="deleteSpecies()">
        Delete
      </button>
    </div>

  </div>
}
